<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGrad" x1="0" y1="0" x2="512" y2="512" gradientUnits="userSpaceOnUse">
      <stop offset="0%"   stop-color="#1a0f35"/>
      <stop offset="100%" stop-color="#0d1628"/>
    </linearGradient>
    <!-- Top bars gradient (vocals - bright) -->
    <linearGradient id="topGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#d4b8ff"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <!-- Bottom bars gradient (instrumental - deeper) -->
    <linearGradient id="botGrad" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%"   stop-color="#6d40c4"/>
      <stop offset="100%" stop-color="#3a2080" stop-opacity="0.7"/>
    </linearGradient>
    <!-- Glow filter -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="softglow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <!-- Clip top half -->
    <clipPath id="clipTop">
      <rect x="0" y="0" width="512" height="252"/>
    </clipPath>
    <!-- Clip bottom half -->
    <clipPath id="clipBot">
      <rect x="0" y="260" width="512" height="252"/>
    </clipPath>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="96" fill="url(#bgGrad)"/>

  <!-- Subtle inner border -->
  <rect width="512" height="512" rx="96" fill="none"
        stroke="#7c5cf0" stroke-width="2.5" opacity="0.35"/>

  <!-- ── Equalizer bars (5 bars, symmetric, centered) ── -->
  <!-- Bar widths: 54px | gaps: 28px | total: 5×54 + 4×28 = 270+112 = 382 | startX = 65 -->
  <!-- Heights: 110, 170, 240, 170, 110 (tallest center) -->
  <!-- All bars vertically centered on Y=256 -->

  <!-- Bar 1  x=65   h=110  y_top=201  y_bot=256 -->
  <rect x="65"  y="201" width="54" height="55"  rx="10" fill="url(#topGrad)" clip-path="url(#clipTop)" filter="url(#glow)"/>
  <rect x="65"  y="256" width="54" height="55"  rx="10" fill="url(#botGrad)" clip-path="url(#clipBot)"/>

  <!-- Bar 2  x=147  h=170  y_top=171  y_bot=256 -->
  <rect x="147" y="171" width="54" height="85"  rx="10" fill="url(#topGrad)" clip-path="url(#clipTop)" filter="url(#glow)"/>
  <rect x="147" y="260" width="54" height="85"  rx="10" fill="url(#botGrad)" clip-path="url(#clipBot)"/>

  <!-- Bar 3  x=229  h=240  y_top=136  y_bot=256  (center/tallest) -->
  <rect x="229" y="136" width="54" height="120" rx="10" fill="url(#topGrad)" clip-path="url(#clipTop)" filter="url(#softglow)"/>
  <rect x="229" y="260" width="54" height="120" rx="10" fill="url(#botGrad)" clip-path="url(#clipBot)"/>

  <!-- Bar 4  x=311  h=170 -->
  <rect x="311" y="171" width="54" height="85"  rx="10" fill="url(#topGrad)" clip-path="url(#clipTop)" filter="url(#glow)"/>
  <rect x="311" y="260" width="54" height="85"  rx="10" fill="url(#botGrad)" clip-path="url(#clipBot)"/>

  <!-- Bar 5  x=393  h=110 -->
  <rect x="393" y="201" width="54" height="55"  rx="10" fill="url(#topGrad)" clip-path="url(#clipTop)" filter="url(#glow)"/>
  <rect x="393" y="256" width="54" height="55"  rx="10" fill="url(#botGrad)" clip-path="url(#clipBot)"/>

  <!-- ── Cut line (the "kill" / separation) ── -->
  <!-- Outer glow of the line -->
  <line x1="44" y1="256" x2="468" y2="256"
        stroke="#a78bfa" stroke-width="10" stroke-linecap="round" opacity="0.25"/>
  <!-- Main line -->
  <line x1="44" y1="256" x2="468" y2="256"
        stroke="white" stroke-width="3" stroke-linecap="round"
        stroke-dasharray="14 7" opacity="0.9"/>

  <!-- Small scissor arrows on the right of the line -->
  <!-- Arrow pointing right-up -->
  <polyline points="452,242 466,256 452,256" fill="none"
            stroke="white" stroke-width="3" stroke-linecap="round"
            stroke-linejoin="round" opacity="0.85"/>
  <!-- Arrow pointing right-down -->
  <polyline points="452,270 466,256 452,256" fill="none"
            stroke="#a78bfa" stroke-width="3" stroke-linecap="round"
            stroke-linejoin="round" opacity="0.85"/>
</svg>
